<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Agora — 다중 에이전트 토론</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- 마크다운 렌더링: marked 로 파싱, DOMPurify 로 XSS 차단 후 출력 -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<!-- 수식 렌더링: 마크다운 안의 $..$ · $$..$$ · 단독 '['/']' 줄을 KaTeX 로 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .msg-body.streaming::after {
    content: '▌'; color: #64748b; margin-left: 1px;
    animation: blink 1s step-end infinite;
  }
  .bubble { border: 1px solid; border-left-width: 4px; }
  .bubble--proponent    { border-color: #34d399; background: #ecfdf5; }
  .bubble--opponent     { border-color: #fb7185; background: #fff1f2; }
  .bubble--fact_checker { border-color: #38bdf8; background: #f0f9ff; }
  .bubble--mediator     { border-color: #a78bfa; background: #f5f3ff; }
  .bubble--analyst      { border-color: #fbbf24; background: #fffbeb; }
  .bubble--neutral      { border-color: #cbd5e1; background: #f8fafc; }
  .bubble--ideator      { border-color: #fbbf24; background: #fffbeb; }
  .bubble--builder      { border-color: #34d399; background: #ecfdf5; }
  .bubble--critic       { border-color: #fb7185; background: #fff1f2; }
  .bubble--synthesizer  { border-color: #a78bfa; background: #f5f3ff; }
  .bubble--pragmatist   { border-color: #38bdf8; background: #f0f9ff; }
  .bubble--consensus    { border-color: #2dd4bf; background: #f0fdfa; }
  .bubble--warning      { border-color: #f87171; background: #fef2f2; }
  .bubble--hint  { border: 1px solid #fcd34d; border-left: 4px solid #f59e0b; background: #fffbeb; }
  .facilitator-note { border: 1px solid #5eead4; border-left: 4px solid #14b8a6; background: #f0fdfa; }
  .timeline::-webkit-scrollbar, aside::-webkit-scrollbar { width: 8px; }
  .timeline::-webkit-scrollbar-thumb, aside::-webkit-scrollbar-thumb {
    background: #cbd5e1; border-radius: 4px;
  }
  /* 마크다운 포스팅 — Tailwind preflight 가 기본 스타일을 리셋하므로 재정의한다 */
  .md { white-space: normal; word-break: break-word; }
  .md > :first-child { margin-top: 0; }
  .md > :last-child { margin-bottom: 0; }
  .md p { margin: 0.5em 0; }
  .md h1, .md h2, .md h3, .md h4 { font-weight: 700; line-height: 1.3; margin: 0.8em 0 0.4em; }
  .md h1 { font-size: 1.25em; }
  .md h2 { font-size: 1.15em; }
  .md h3 { font-size: 1.05em; }
  .md ul, .md ol { margin: 0.5em 0; padding-left: 1.4em; }
  .md ul { list-style: disc; }
  .md ol { list-style: decimal; }
  .md li { margin: 0.2em 0; }
  .md strong { font-weight: 700; }
  .md em { font-style: italic; }
  .md a { color: #2563eb; text-decoration: underline; }
  .md code { background: #e2e8f0; padding: 0.1em 0.35em; border-radius: 4px;
             font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
  .md pre { background: #1e293b; color: #e2e8f0; padding: 0.8em; border-radius: 6px;
            overflow-x: auto; margin: 0.6em 0; }
  .md pre code { background: none; padding: 0; color: inherit; }
  .md blockquote { border-left: 3px solid #cbd5e1; padding-left: 0.8em;
                   margin: 0.5em 0; color: #475569; }
  .md table { border-collapse: collapse; margin: 0.6em 0; }
  .md th, .md td { border: 1px solid #cbd5e1; padding: 0.3em 0.6em; text-align: left; }
  .md th { background: #f1f5f9; font-weight: 700; }
  .md hr { border: 0; border-top: 1px solid #cbd5e1; margin: 0.8em 0; }
</style>
</head>
<body class="h-screen flex flex-col bg-slate-100 text-slate-800">

  <!-- 헤더 -->
  <header class="h-14 bg-slate-900 text-white flex items-center px-5 gap-3 shrink-0">
    <span class="text-lg font-bold">🏛 Agent Agora</span>
    <span class="text-xs text-slate-400">다중 에이전트 구조화 토론 · 브레인스토밍</span>
    <span id="statusPill"
          class="ml-auto text-xs px-3 py-1 rounded-full bg-slate-700 text-slate-200">
      대기 중
    </span>
    <span id="usagePill" class="text-xs text-slate-400"></span>
    <button id="loadBtn"
            class="text-xs px-2.5 py-1 rounded bg-slate-700 hover:bg-slate-600
                   text-slate-200">📂 불러오기</button>
    <input id="loadFileInput" type="file"
           accept=".md,.markdown,text/markdown,text/plain" class="hidden" />
    <button id="exportBtn"
            class="text-xs px-2.5 py-1 rounded bg-slate-700 hover:bg-slate-600
                   text-slate-200">📄 텍스트 저장</button>
  </header>

  <main class="flex-1 flex min-h-0">

    <!-- ===== 세팅 존 ===== -->
    <aside class="w-[380px] bg-white border-r border-slate-200 overflow-y-auto p-4 shrink-0">
      <h2 class="text-sm font-bold text-slate-700 mb-3">⚙️ 토론 설정</h2>

      <label class="block text-xs font-semibold text-slate-500 mb-1">토론 형식</label>
      <select id="formatSelect"
              class="w-full mb-1 px-2 py-1.5 text-sm border border-slate-300 rounded">
      </select>
      <p id="formatDesc" class="text-[11px] text-slate-400 mb-3"></p>

      <label class="flex items-center gap-2 cursor-pointer mb-4">
        <input type="checkbox" id="forceToggle" class="sr-only peer" />
        <div class="w-9 h-5 bg-slate-300 rounded-full relative transition
                    peer-checked:bg-emerald-500
                    after:content-[''] after:absolute after:top-0.5 after:left-0.5
                    after:bg-white after:w-4 after:h-4 after:rounded-full after:transition
                    peer-checked:after:translate-x-4"></div>
        <span class="text-sm font-semibold">FORCE_CONSENSUS <span class="text-slate-400 font-normal">(마지막 단계 합의 강제)</span></span>
      </label>

      <div class="flex items-center justify-between mb-2">
        <label class="text-xs font-semibold text-slate-500">에이전트 등록</label>
        <button id="addSlotBtn" class="text-xs text-sky-600 hover:underline">+ 에이전트 추가</button>
      </div>
      <div id="agentSlots" class="space-y-3"></div>

      <div class="flex items-center justify-between mb-1 mt-4">
        <label class="text-xs font-semibold text-slate-500">사회자 (선택)</label>
        <label class="flex items-center gap-1.5 cursor-pointer text-[11px] text-slate-500">
          <input type="checkbox" id="facToggle" /> 🎙 사회자 추가
        </label>
      </div>
      <p class="text-[11px] text-slate-400 mb-2">
        사회자는 토론자가 아닙니다 — 단계 경계에서 진행을 조율합니다.</p>
      <div id="facilitatorSlot" class="hidden"></div>

      <button id="startBtn"
              class="w-full mt-4 py-2 bg-slate-900 text-white text-sm font-bold rounded
                     hover:bg-slate-700 disabled:bg-slate-400">
        ▶ 토론 시작
      </button>
      <button id="resetBtn"
              class="w-full mt-2 py-2 bg-white border border-slate-300 text-slate-600
                     text-sm font-bold rounded hover:bg-slate-100">
        ↺ 초기화 (처음부터 다시)
      </button>
    </aside>

    <!-- ===== 타임라인 (토론 주제 + 포스팅 + 개입 존) ===== -->
    <section class="flex-1 flex flex-col min-h-0">
      <div id="timeline" class="timeline flex-1 overflow-y-auto p-5">
        <!-- 토론 주제 — 타임라인의 첫 카드. 다른 포스팅들과 함께 스크롤된다. -->
        <div id="topicCard" class="bg-white border border-slate-200 rounded-lg p-3 mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">📌 토론 주제</label>
          <textarea id="topicInput" rows="2"
                    placeholder="토론 주제를 입력하세요 — 여러 줄·마크다운·LaTeX 수식 OK"
                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded
                           resize-y leading-relaxed"
                    >신규 사용자의 첫 일주일 경험을 어떻게 개선할까?</textarea>
          <!-- 토론 시작 후 잠긴 주제 — textarea 대신 마크다운으로 렌더링한다. -->
          <div id="topicRender" class="md hidden text-sm text-slate-800 leading-relaxed"></div>
        </div>
        <div id="placeholder" class="text-center text-slate-400 mt-16 text-sm">
          위에 주제를 적고 좌측에서 에이전트를 설정한 뒤 <b>[▶ 토론 시작]</b>을 누르세요.
        </div>
      </div>

      <!-- 동기식 대기 큐 인터페이스 (WAITING_FOR_USER 시 노출) -->
      <div id="interventionBar" class="border-t border-slate-200 bg-white p-3 hidden">
        <div id="interventionLabel" class="text-xs font-bold text-amber-600 mb-2">
          ⏸ 단계 종료 — 유저 개입 대기 중
        </div>
        <textarea id="interventionInput" rows="2"
                  placeholder="참가자 H로서 토론에 개입할 내용을 입력하세요…"
                  class="w-full mb-2 px-2 py-1.5 text-sm border border-slate-300 rounded"></textarea>
        <div class="flex gap-2">
          <button id="postBtn"
                  class="flex-1 py-1.5 bg-amber-500 text-white text-sm font-bold rounded
                         hover:bg-amber-600 disabled:bg-slate-300">
            H로 토론 개입 포스팅
          </button>
          <button id="skipBtn"
                  class="flex-1 py-1.5 bg-slate-700 text-white text-sm font-bold rounded
                         hover:bg-slate-600 disabled:bg-slate-300">
            개입 없이 다음 단계 진행 (Skip)
          </button>
        </div>
        <button id="endBtn"
                class="w-full mt-2 py-1.5 bg-white border border-rose-300 text-rose-600
                       text-sm font-bold rounded hover:bg-rose-50 disabled:opacity-50">
          ⏹ 여기서 토론 종료
        </button>
      </div>
    </section>
  </main>

<script>
"use strict";

// ---- 상수 / 매핑 -----------------------------------------------------------
// 토론 형식별 단계 구성은 GET /formats 로 받아온다 (단계 수·라벨이 형식마다 다르다).
let formatsById = {};            // format_id -> { name, description, supports_consensus, phases }
let currentFormatId = 'debate';  // 현재(또는 선택 중인) 토론 형식
const PERSONA_LABEL = {
  ideator: '아이디어 발상가', builder: '아이디어 확장가', critic: '비판적 검토자',
  synthesizer: '통합·정리자', pragmatist: '실용성 검토자', neutral: '자유 참여자',
  consensus: '합의 조정', warning: '응답 실패',
  proponent: '찬성론자', opponent: '반대론자', fact_checker: '팩트체커',
  mediator: '중재자', analyst: '분석가',
};
const PROVIDERS = [['openai', 'OpenAI'], ['anthropic', 'Anthropic'],
                   ['deepseek', 'DeepSeek'], ['ollama', 'Ollama'],
                   ['manual', 'Manual Tunnel']];
// 공급자별 대표 모델 — 첫 항목이 기본값. '기타(직접 입력)' 옵션이 자동으로
// 끝에 붙어, 목록 외 모델도 막지 않는다 (오타 방지 + 자유도).
const MODELS_BY_PROVIDER = {
  openai:    ['gpt-4o-mini', 'gpt-4o', 'gpt-4.1-mini', 'gpt-4.1',
              'o3-mini', 'o4-mini'],
  anthropic: ['claude-haiku-4-5', 'claude-sonnet-4-5', 'claude-opus-4-7',
              'claude-3-5-haiku-latest', 'claude-3-5-sonnet-latest'],
  deepseek:  ['deepseek-chat', 'deepseek-reasoner'],
  ollama:    ['llama3.2', 'llama3.1', 'mistral', 'qwen2.5', 'gemma2', 'phi3'],
  manual:    ['manual'],
};
const MODEL_CUSTOM_VALUE = '__custom__';   // '기타(직접 입력)' 옵션의 sentinel
const PTYPES = [['ideator', '아이디어 발상가'], ['builder', '아이디어 확장가'],
                ['critic', '비판적 검토자'], ['synthesizer', '통합·정리자'],
                ['pragmatist', '실용성 검토자'], ['neutral', '자유 참여자']];
const PRESETS = [
  { name: '발상가', provider: 'openai', model: 'gpt-4o-mini', ptype: 'ideator',
    persona: '제약 없이 새로운 아이디어를 빠르게 쏟아내는 발상가. 엉뚱하더라도 선택지를 먼저 늘린다.' },
  { name: '확장가', provider: 'openai', model: 'gpt-4o-mini', ptype: 'builder',
    persona: "다른 참가자의 아이디어에 '예, 그리고'로 살을 붙여 키우는 확장가. 좋은 씨앗을 구체화한다." },
  { name: '검토자', provider: 'openai', model: 'gpt-4o-mini', ptype: 'critic',
    persona: '아이디어의 약점과 빠진 관점을 건설적으로 짚는 검토자. 깎아내리지 않고 더 단단하게 만든다.' },
];

// ---- 전역 상태 -------------------------------------------------------------
let discussionId = null;
let ws = null;
let agentsById = {};       // agent_id -> AgentConfig
let bubbles = {};          // `${phase}__${agentId}` -> { wrap, body, ptype, streaming }
let lastCompletedPhase = null;
let wsReconnectAttempts = 0;   // WebSocket 지수 백오프 재연결 시도 횟수
let wsReconnectTimer = null;   // 예약된 재연결 타이머 핸들
let usageTotal = 0;            // 누적 토큰 사용량 (에이전트 발언 기준)
let lastConvergence = null;    // 가장 최근 단계의 합의 근접도 (0~1)
let hasFacilitator = false;    // 사회자 슬롯 여부 — H 개입의 between 재작성 분기에 쓴다

// ---- DOM 핸들 --------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const timelineEl = $('timeline');

// ---- 유틸 ------------------------------------------------------------------
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = (s == null) ? '' : String(s);
  return d.innerHTML;
}
// LLM 응답에서 자주 보이는 비표준 마크다운 패턴을 표준 markdown 으로 정규화한다.
// (1) 단독 '#####' (5+ 해시) 줄은 가로 구분선으로, (2) 단독 '[' / ']' 줄은 LaTeX
// 디스플레이 수식 구분자($$)로 치환한다.
function preprocessMarkdown(src) {
  src = src.replace(/^\s*#{5,}\s*$/gm, '---');
  // 함수 형태로 치환 — String.replace 의 '$$' 는 리터럴 '$' 로 해석되므로
  // 문자열 치환을 쓰면 안 된다.
  src = src.replace(/^\s*\[\s*$/gm, () => '$$').replace(/^\s*\]\s*$/gm, () => '$$');
  return src;
}

// LaTeX 수식($$..$$ 디스플레이, $..$ 인라인)을 미리 KaTeX HTML 로 렌더한다 —
// marked 의 줄바꿈 처리(<br>)가 수식 안에 끼어들기 전에 통째로 치환해야 수식이
// 깨지지 않는다. 렌더 실패 시(KaTeX 미로드·문법 오류)는 원문을 그대로 둔다.
function prerenderMath(src) {
  if (typeof katex === 'undefined') return src;
  const safe = (tex, displayMode) => {
    try {
      return katex.renderToString(tex.trim(), {
        displayMode, throwOnError: false, output: 'html',
      });
    } catch (e) { return null; }
  };
  // 디스플레이($$..$$) 먼저 — 인라인 매치가 디스플레이 경계를 잠식하지 않게.
  src = src.replace(/\$\$([\s\S]+?)\$\$/g, (m, tex) => safe(tex, true) || m);
  // 인라인($..$) — 한 줄, 그 사이에 '$' 가 들어가지 않은 경우만.
  src = src.replace(/\$([^\$\n]+?)\$/g, (m, tex) => safe(tex, false) || m);
  return src;
}

// 마크다운 포스팅을 안전한 HTML 로 렌더링한다. marked 로 파싱하고 DOMPurify 로
// XSS 를 차단하므로 LLM·복붙 응답을 innerHTML 로 넣어도 안전하다. 라이브러리가
// 로드되지 않았으면(오프라인 등) 평문 이스케이프로 폴백한다.
function renderMarkdown(text) {
  const src = (text == null) ? '' : String(text);
  if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
    return escapeHtml(src);
  }
  const normalized = prerenderMath(preprocessMarkdown(src));
  return DOMPurify.sanitize(marked.parse(normalized));
}
function scrollTimeline() { timelineEl.scrollTop = timelineEl.scrollHeight; }
// 타임라인을 비우되 주제 카드(#topicCard)는 보존한다 — 시작·스냅샷·초기화 공통.
function clearTimeline() {
  Array.from(timelineEl.children).forEach((child) => {
    if (child.id !== 'topicCard') child.remove();
  });
}
// 단계 인스턴스 키('probe#3')를 사람이 읽는 라벨로 — 반복 단계는 라운드를 덧붙인다.
function phaseLabel(phaseId) {
  const parts = String(phaseId || '').split('#');
  const base = parts[0], round = parts[1];
  const fmt = formatsById[currentFormatId];
  const spec = fmt && fmt.phases.find((p) => p.id === base);
  const label = spec ? spec.label : base;
  return round ? `${label} · ${round}라운드` : label;
}
// 단계 인스턴스 키를 DOM id 로 안전하게 — '#' 를 '_' 로 치환한다.
function secId(phase) { return 'sec-' + String(phase).replace(/#/g, '_'); }
function personaLabel(p) { return PERSONA_LABEL[p] || p; }
function setStatus(text, kind) {
  const pill = $('statusPill');
  pill.textContent = text;
  const colors = { waiting: 'bg-amber-500', done: 'bg-emerald-600',
                   error: 'bg-rose-600', run: 'bg-sky-600' };
  pill.className = 'ml-auto text-xs px-3 py-1 rounded-full text-white '
                 + (colors[kind] || 'bg-slate-600');
}

// 누적 토큰 사용량을 헤더에 표시한다 (에이전트 발언 기준 합계).
function updateUsagePill() {
  $('usagePill').textContent =
    usageTotal ? ('🪙 ' + usageTotal.toLocaleString() + ' 토큰') : '';
}

// ---- 세팅 존: 에이전트 슬롯 -------------------------------------------------
// 공급자별 모델 옵션을 채운다. ``current`` 가 목록에 있으면 선택, 없으면 '기타'
// 로 떨어지고 커스텀 입력란에 값이 들어간다.
function populateModelOptions(selectEl, provider, current) {
  const models = MODELS_BY_PROVIDER[provider] || [];
  const opts = models.map((m) =>
    `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`);
  opts.push(`<option value="${MODEL_CUSTOM_VALUE}">기타 (직접 입력)</option>`);
  selectEl.innerHTML = opts.join('');
  const slot = selectEl.closest('.agent-slot') || selectEl.closest('.facilitator-slot');
  const customEl = slot
    && (slot.querySelector('.a-model-custom') || slot.querySelector('.f-model-custom'));
  if (current && models.includes(current)) {
    selectEl.value = current;
    if (customEl) { customEl.value = ''; }
  } else if (current) {
    selectEl.value = MODEL_CUSTOM_VALUE;     // 목록 외 모델 → 기타로
    if (customEl) { customEl.value = current; }
  } else {
    selectEl.value = models[0] || MODEL_CUSTOM_VALUE;
    if (customEl) { customEl.value = ''; }
  }
  updateCustomVisibility(selectEl);
}

// '기타' 선택 시 커스텀 입력란을 보이고, 그 외엔 감춘다.
function updateCustomVisibility(selectEl) {
  const slot = selectEl.closest('.agent-slot') || selectEl.closest('.facilitator-slot');
  if (!slot) return;
  const customEl = slot.querySelector('.a-model-custom') || slot.querySelector('.f-model-custom');
  if (!customEl) return;
  if (selectEl.value === MODEL_CUSTOM_VALUE) {
    customEl.classList.remove('hidden');
  } else {
    customEl.classList.add('hidden');
  }
}

// 슬롯에서 실효 모델명을 읽는다 — '기타' 선택 시 커스텀 입력란, 아니면 select 값.
function readSlotModel(slot, selectClass, customClass) {
  const sel = slot.querySelector(selectClass);
  if (!sel) return '';
  if (sel.value === MODEL_CUSTOM_VALUE) {
    return (slot.querySelector(customClass).value || '').trim();
  }
  return sel.value.trim();
}

function addAgentSlot(preset) {

function defaultModelFor(provider) {
  return (MODELS_BY_PROVIDER[provider] || ['gpt-4o-mini'])[0];
}

function collectAgents() {
  const agents = [];
  let n = 0;
  document.querySelectorAll('.agent-slot').forEach((slot) => {
    const name = slot.querySelector('.a-name').value.trim();
    const persona = slot.querySelector('.a-persona').value.trim();
    if (!name || !persona) return;
    n += 1;
    const provider = slot.querySelector('.a-provider').value;
    const model = readSlotModel(slot, '.a-model-select', '.a-model-custom')
                  || defaultModelFor(provider);
    agents.push({
      agent_id: 'a' + n,
      name: name,
      model: model,
      provider: provider,
      persona_type: slot.querySelector('.a-ptype').value,
      persona_prompt: persona,
    });
  });
  return agents;
}

function collectFacilitator() {
  if (!$('facToggle').checked) return null;
  const slot = $('facilitatorSlot');
  const name = slot.querySelector('.f-name').value.trim();
  const persona = slot.querySelector('.f-persona').value.trim();
  if (!name || !persona) return null;
  const provider = slot.querySelector('.f-provider').value;
  const model = readSlotModel(slot, '.f-model-select', '.f-model-custom')
                || defaultModelFor(provider);
  return {
    agent_id: 'facilitator', name: name,
    model: model,
    provider: provider,
    persona_prompt: persona,
  };
}

// 페르소나 초안을 토론 주제 맥락에 맞춰 윤문한다 (해당 슬롯의 provider/model 사용).
async function refinePersona(slot) {
  const topic = $('topicInput').value.trim();
  const draft = slot.querySelector('.a-persona').value.trim();
  const provider = slot.querySelector('.a-provider').value;
  const model = readSlotModel(slot, '.a-model-select', '.a-model-custom') || 'gpt-4o-mini';
  if (!topic) { alert('먼저 토론 주제를 입력하세요.'); return; }
  if (!draft) { alert('윤문할 페르소나 초안을 먼저 입력하세요. (대강 써도 됩니다)'); return; }
  if (provider === 'manual') {
    alert('manual 슬롯은 윤문할 수 없습니다. OpenAI/Anthropic/Ollama 슬롯에서 시도하세요.');
    return;
  }
  const btn = slot.querySelector('.a-refine');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '✨ 윤문 중…';
  try {
    const res = await fetch('/personas/refine', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic: topic, draft: draft, provider: provider, model: model,
        name: slot.querySelector('.a-name').value.trim(),
        persona_type: slot.querySelector('.a-ptype').value,
      }),
    });
    if (!res.ok) throw new Error('윤문 실패: ' + res.status + ' ' + (await res.text()));
    const data = await res.json();
    slot.querySelector('.a-persona').value = data.refined || draft;
    btn.textContent = '✓ 윤문 완료';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  } catch (e) {
    alert(e.message);
    btn.textContent = orig;
  } finally {
    btn.disabled = false;
  }
}

// ---- 토론 시작 + WebSocket 연결 --------------------------------------------
async function startDiscussion() {
  const topic = $('topicInput').value.trim();
  if (!topic) { alert('토론 주제를 입력하세요.'); return; }
  const agents = collectAgents();
  if (agents.length < 2) { alert('이름과 페르소나가 채워진 에이전트를 2명 이상 등록하세요.'); return; }

  $('startBtn').disabled = true;
  try {
    const facilitator = collectFacilitator();
    hasFacilitator = !!facilitator;     // postIntervention 분기에 쓴다
    const res = await fetch('/discussions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic, format_id: $('formatSelect').value,
        force_consensus: $('forceToggle').checked, agents,
        facilitator,
      }),
    });
    if (!res.ok) throw new Error('토론 생성 실패: ' + res.status + ' ' + (await res.text()));
    discussionId = (await res.json()).discussion_id;
    setTopicReadOnly(true);            // 토론 시작 후 주제는 고정 — 마크다운 렌더 뷰로
    const intercepts = currentIntercepts();
    if (intercepts.length) {
      await fetch(`/discussions/${discussionId}/intercept`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent_ids: intercepts }),
      });
    }
    clearTimeline();
    bubbles = {};
    wsReconnectAttempts = 0;
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
    if (ws) { try { ws.close(); } catch (e) {} }
    connectWS(discussionId);
  } catch (e) {
    alert(e.message);
    $('startBtn').disabled = false;
  }
}

// 진행 중이던 토론 연결을 끊고 UI 를 시작 전 상태로 되돌린다 (설정 폼은 유지).
function resetDiscussion() {
  discussionId = null;   // scheduleReconnect 가 즉시 멈추도록 가장 먼저 비운다
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  wsReconnectAttempts = 0;
  if (ws) { try { ws.close(); } catch (e) {} ws = null; }
  bubbles = {};
  agentsById = {};
  lastCompletedPhase = null;
  usageTotal = 0;
  lastConvergence = null;
  hasFacilitator = false;
  updateUsagePill();
  clearTimeline();
  const placeholder = document.createElement('div');
  placeholder.id = 'placeholder';
  placeholder.className = 'text-center text-slate-400 mt-16 text-sm';
  placeholder.innerHTML =
    '위에 주제를 적고 좌측에서 에이전트를 설정한 뒤 '
    + '<b>[▶ 토론 시작]</b>을 누르세요.';
  timelineEl.appendChild(placeholder);
  hideInterventionBar();
  $('interventionInput').value = '';
  setTopicReadOnly(false);            // 다시 편집 가능 상태로 (textarea 노출)
  $('topicCard').classList.remove('hidden');   // 불러오기 모드에서 가려져 있었다면
  $('startBtn').disabled = false;
  setStatus('대기 중', '');
}

// ---- 저장된 토론(.md) 불러오기 — 읽기 전용 뷰 -------------------------------
// 다운로드한 export 파일이든 로컬 discussions/ 의 archive 파일이든, 사용자가
// 파일 피커로 고른 마크다운을 통째 렌더해 보여준다. 이어가기는 지원하지 않는다.
function openLoadFile() { $('loadFileInput').click(); }

async function onLoadFileChange(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = '';   // 같은 파일을 다시 선택할 수 있도록 초기화

function enterViewMode(markdown, filename) {
  // 진행 중 세션·소켓이 있으면 모두 정리하고 깨끗한 상태로 진입한다.
  resetDiscussion();
  // 불러온 파일은 자체 헤더(주제·에이전트 목록 등)를 가지므로 주제 카드는 가린다.
  $('topicCard').classList.add('hidden');
  // 시작 버튼은 비활성화 — 불러온 토론은 이어갈 수 없다.
  $('startBtn').disabled = true;
  // placeholder 가 있으면 제거하고, 통째 렌더한 카드 하나로 채운다.
  clearTimeline();
  const ph = $('placeholder'); if (ph) ph.remove();
  const card = document.createElement('article');
  card.id = 'loadedCard';
  card.className = 'md bg-white border border-slate-200 rounded-lg p-5';

// 현재 토론의 전체 기록을 마크다운 파일로 로컬 discussions/ 폴더에 저장한다.
async function exportDiscussion() {
  if (!discussionId) {
    alert('저장할 토론이 없습니다. 토론을 먼저 시작하세요.');
    return;
  }
  try {
    const r = await fetch('/discussions/' + discussionId + '/archive',
                          { method: 'POST' });
    if (!r.ok) throw new Error('저장 실패: ' + r.status);
    const data = await r.json();
    alert('토론 기록을 저장했습니다:\n' + data.path);
  } catch (e) {
    alert(e.message);
  }
}

function connectWS(id) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/discussions/${id}/ws`);
  ws.onopen = () => {
    wsReconnectAttempts = 0;            // 연결 성공 — 백오프 초기화
    setStatus('연결됨 — 토론 진행 중', 'run');
  };
  ws.onmessage = (ev) => {
    try { handleMessage(JSON.parse(ev.data)); }
    catch (e) { console.error('WS 메시지 처리 오류', e); }
  };
  ws.onclose = (ev) => {
    if (ev && ev.code === 4004) {       // 서버: 토론 없음 — 재연결 무의미
      setStatus('토론을 찾을 수 없음', 'error');
      return;
    }
    scheduleReconnect(id);              // 그 외 단절 → 지수 백오프 재연결
  };
  ws.onerror = () => {};                // onclose 가 이어서 재연결을 처리한다
}

// 끊긴 WebSocket 을 지수 백오프(1·2·4…최대 30초)로 자동 재연결한다.
function scheduleReconnect(id) {
  if (!discussionId || discussionId !== id) return;   // 종료/다른 토론 — 재연결 안 함
  if (wsReconnectTimer) return;                       // 이미 예약됨
  wsReconnectAttempts += 1;
  if (wsReconnectAttempts > 10) {
    setStatus('연결 끊김 — 재연결 한도 초과, 페이지를 새로고침하세요', 'error');
    return;
  }
  const delay = Math.min(30000, 1000 * 2 ** (wsReconnectAttempts - 1));
  setStatus(`연결 끊김 — ${Math.round(delay / 1000)}초 후 재연결 (#${wsReconnectAttempts})`,
            'error');
  wsReconnectTimer = setTimeout(() => {
    wsReconnectTimer = null;
    connectWS(id);
  }, delay);
}

// ---- WebSocket 메시지 디스패치 ---------------------------------------------
function handleMessage(msg) {
  const p = msg.payload || {};
  switch (msg.type) {
    case 'state_snapshot':       renderSnapshot(p.state || {}); break;
    case 'phase_started':        onPhaseStarted(p.phase); break;
    case 'token_stream':         appendToken(p.phase, p.agent_id, p.token); break;
    case 'agent_turn':           finalizeTurn(p.turn); break;
    case 'phase_completed':      renderSummary(p.phase, p.summary, p.final_joint_agreement); break;
    case 'awaiting_user':        onAwaitingUser(p); break;
    case 'user_intervention':    renderIntervention(p.intervention); break;
    case 'discussion_completed': onCompleted(p); break;
    case 'manual_input_required': onManualInputRequired(p); break;
    case 'review_required':      onReviewRequired(p.review); break;
    case 'review_answer':        onReviewAnswer(p.exchange); break;
    case 'facilitator_note':     renderFacilitatorNote(p.note); break;
    case 'error':                renderError(p.message); break;
    default:                     console.warn('알 수 없는 메시지', msg.type);
  }
}

function onPhaseStarted(phase) {
  ensurePhaseSection(phase);
  setStatus('진행 중 — ' + phaseLabel(phase), 'run');
  hideInterventionBar();
}

// ---- 타임라인 렌더링 -------------------------------------------------------
function ensurePhaseSection(phase) {
  let sec = $(secId(phase));
  if (!sec) {
    sec = document.createElement('section');
    sec.id = secId(phase);
    sec.className = 'mb-6';
    sec.innerHTML =
      `<h3 class="text-sm font-bold text-slate-500 border-b border-slate-200 pb-1 mb-3">`
      + escapeHtml(phaseLabel(phase)) + `</h3>`
      + `<div class="phase-body space-y-3"></div>`;
    timelineEl.appendChild(sec);
  }
  return sec.querySelector('.phase-body');
}

function ensureBubble(phase, agentId) {
  const key = phase + '__' + agentId;
  if (bubbles[key]) return bubbles[key];
  const isConsensus = (agentId === 'consensus');
  const agent = agentsById[agentId] || {};
  const ptype = isConsensus ? 'consensus' : (agent.persona_type || 'neutral');
  const name = isConsensus ? '합의안 (조정자)' : (agent.name || agentId);

  const wrap = document.createElement('div');
  wrap.className = 'bubble bubble--' + ptype + ' rounded-lg p-3';
  wrap.innerHTML =
    `<div class="flex items-center gap-2 mb-1">`
    + `<span class="text-xs font-bold text-slate-700">${escapeHtml(name)}</span>`
    + `<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-white/80 text-slate-500">`
    + escapeHtml(personaLabel(ptype)) + `</span></div>`
    + `<div class="msg-body text-sm text-slate-800 whitespace-pre-wrap leading-relaxed"></div>`;
  ensurePhaseSection(phase).appendChild(wrap);

  const rec = { wrap, body: wrap.querySelector('.msg-body'), ptype, streaming: false };
  bubbles[key] = rec;
  return rec;
}

function appendToken(phase, agentId, token) {
  const b = ensureBubble(phase, agentId);
  if (!b.streaming) {
    b.streaming = true;
    b.body.classList.add('streaming');
    b.body.textContent = '';   // 검토 대기 등 플레이스홀더를 비우고 스트리밍 시작
  }
  b.body.textContent += token;
  scrollTimeline();
}

function finalizeTurn(turn) {
  if (!turn) return;
  const b = ensureBubble(turn.phase, turn.agent_id);
  // 발언 확정 — 복붙/검토 패널 제거
  b.wrap.querySelectorAll('.manual-panel, .review-panel').forEach((p) => p.remove());
  // 확정된 포스팅은 마크다운으로 렌더링한다 (스트리밍 중에는 평문 그대로).
  b.body.innerHTML = renderMarkdown(turn.content || '');
  b.body.classList.remove('streaming', 'whitespace-pre-wrap');
  b.body.classList.add('md');
  b.streaming = false;
  const failed = (turn.metadata && turn.metadata.failed)
              || (turn.content || '').startsWith('[시스템 경고');
  if (failed) {
    b.wrap.classList.remove('bubble--' + b.ptype);
    b.wrap.classList.add('bubble--warning');
  }
  if (turn.metadata && turn.metadata.reviewed) {
    const header = b.wrap.querySelector('div');
    if (header && !header.querySelector('.reviewed-badge')) {
      const badge = document.createElement('span');
      badge.className = 'reviewed-badge text-[10px] px-1.5 py-0.5 rounded-full '
                      + 'bg-violet-100 text-violet-700';
      badge.textContent = '🔍 검토됨';
      header.appendChild(badge);
    }
  }
  const used = (turn.metadata || {}).usage || {};
  usageTotal += (used.prompt_tokens || 0) + (used.completion_tokens || 0);
  updateUsagePill();
  scrollTimeline();
}

function renderSummary(phase, summary, agreement) {
  if (summary) {
    lastConvergence = summary.convergence_score;
    const body = ensurePhaseSection(phase);
    const pct = Math.round((summary.convergence_score || 0) * 100);
    const conflicts = (summary.key_conflicts || []).map(escapeHtml).join(' · ');
    const div = document.createElement('div');
    div.className = 'text-xs bg-slate-100 border border-slate-200 rounded-lg p-3';
    div.innerHTML =
      `<div class="font-bold text-slate-600 mb-1">📊 단계 요약 · 합의 근접도 ${pct}%</div>`
      + (conflicts ? `<div class="text-slate-500">주요 쟁점: ${conflicts}</div>` : '');
    body.appendChild(div);
  }
  if (agreement) renderAgreement(agreement);
  scrollTimeline();
}

function renderAgreement(text) {
  if ($('agreementBox')) return;
  const div = document.createElement('div');
  div.id = 'agreementBox';
  div.className = 'bubble bubble--consensus rounded-lg p-4 my-3';
  div.innerHTML =
    `<div class="text-sm font-bold text-teal-700 mb-1">🤝 최종 합의안 (force_consensus)</div>`
    + `<div class="text-sm text-slate-800 leading-relaxed md">`
    + renderMarkdown(text) + `</div>`;
  timelineEl.appendChild(div);
  scrollTimeline();
}

function renderIntervention(iv) {
  if (!iv) return;
  const div = document.createElement('div');
  div.className = 'bubble--hint rounded-lg p-3 my-2';
  div.innerHTML =
    `<div class="text-xs font-bold text-amber-700 mb-1">🙋 참가자 H 개입</div>`
    + `<div class="text-sm text-slate-800 md">${renderMarkdown(iv.message)}</div>`;
  timelineEl.appendChild(div);
  scrollTimeline();
}

// 사회자 진행 노트 — 토론자 말풍선과 구별되는 청록 배너로 렌더링한다.
const FAC_KIND_LABEL = { open: '개회', between: '중간 조율',
                         close: '폐회', decision: '진행 결정' };
function renderFacilitatorNote(note) {
  if (!note) return;
  // 같은 (kind, phase) 노트가 이미 있으면 새 노트로 교체한다 — H 개입 후 사회자가
  // between 을 재작성한 경우 등.
  const dedup = `.facilitator-note[data-fkind="${CSS.escape(note.kind)}"]`
              + `[data-fphase="${CSS.escape(note.phase || '')}"]`;
  const existing = timelineEl.querySelector(dedup);
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = 'facilitator-note rounded-lg p-3 my-3';
  div.dataset.fkind = note.kind;
  div.dataset.fphase = note.phase || '';
  div.innerHTML =
    `<div class="text-xs font-bold text-teal-700 mb-1">`
    + `🎙 사회자 · ${FAC_KIND_LABEL[note.kind] || note.kind}</div>`
    + `<div class="text-sm text-slate-800 md">${renderMarkdown(note.content)}</div>`;
  // 개회·중간 노트는 해당 단계 섹션에, 폐회 노트는 타임라인 끝에 붙인다.
  if (note.kind === 'close') {
    timelineEl.appendChild(div);
  } else {
    ensurePhaseSection(note.phase).appendChild(div);
  }
  scrollTimeline();
}

// 현재 게이트의 단계가 반복(repeatable) 단계인지 — between vs decision 분기 판정.
function isCurrentPhaseRepeatable() {
  const fmt = formatsById[currentFormatId];
  if (!fmt) return false;
  const base = String(lastCompletedPhase || '').split('#')[0];
  const spec = fmt.phases.find((p) => p.id === base);
  return !!(spec && spec.repeatable);
}

function renderError(message) {
  setStatus('⚠ 오류', 'error');
  const div = document.createElement('div');
  div.className = 'bubble bubble--warning rounded-lg p-3 my-2 text-sm';
  div.textContent = '⚠ ' + (message || '알 수 없는 오류');
  timelineEl.appendChild(div);
  scrollTimeline();
}

// ---- 수동(Manual Tunnel) 에이전트 ------------------------------------------
async function copyText(text, btn) {
  const orig = btn.textContent;
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ 복사됨';
  } catch (e) {
    window.prompt('아래 텍스트를 복사하세요 (Ctrl/Cmd+C):', text);  // 클립보드 폴백
    btn.textContent = '복사 영역 표시';
  }
  setTimeout(() => { btn.textContent = orig; }, 1600);
}

async function submitManual(agentId, phase, panel) {
  const content = panel.querySelector('.manual-input').value.trim();
  if (!content) { alert('외부 LLM 의 응답을 붙여넣으세요.'); return; }
  const btn = panel.querySelector('.manual-submit');
  btn.disabled = true;
  try {
    const res = await fetch(`/discussions/${discussionId}/manual-response`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_id: agentId, phase: phase, content: content }),
    });
    if (!res.ok) throw new Error('응답 제출 실패: ' + res.status + ' ' + (await res.text()));
    panel.remove();   // agent_turn 메시지가 말풍선을 확정한다
    setStatus('수동 응답 제출됨 — 파이프라인 재구동', 'run');
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
  }
}

// 수동 입력 패널을 생성하거나(없으면) 복사 페이로드를 갱신한다(있으면).
// 새로고침/재연결로 패널이 증발해도 renderSnapshot 이 재호출해 복구할 수 있다.
function onManualInputRequired(payload) {
  const { agent_id, phase, deep_copy, general_copy } = payload;
  const b = ensureBubble(phase, agent_id);
  const name = (agentsById[agent_id] || {}).name || agent_id;
  setStatus('⏸ 수동 입력 대기 — ' + name, 'waiting');
  if (!b.body.textContent) b.body.textContent = '(수동 에이전트 — 응답 대기 중…)';

  let panel = b.wrap.querySelector('.manual-panel');
  if (!panel) {
    panel = buildManualPanel(agent_id, phase);
    b.wrap.appendChild(panel);
  }
  applyManualPayloads(panel, deep_copy, general_copy);
  scrollTimeline();
}

// 복붙 패널 DOM 을 만든다 (복사 버튼·붙여넣기창·제출 버튼 + 이벤트 배선).
function buildManualPanel(agentId, phase) {
  const panel = document.createElement('div');
  panel.className = 'manual-panel mt-2 pt-2 border-t border-dashed border-amber-400';
  // 작성 중 텍스트 대피/복원(captureDrafts·restoreDrafts)의 매칭 키.
  panel.dataset.agentId = agentId;
  panel.dataset.phase = phase;
  panel.innerHTML =
    `<div class="text-[11px] text-amber-700 mb-1">🔌 Manual Tunnel — `
    + `복사본을 외부 LLM 에 붙여넣고, 받은 응답을 아래 칸에 붙여넣어 제출하세요.</div>`
    + `<div class="flex gap-1 mb-1">`
    + `<button class="copy-deep text-[11px] px-2 py-1 rounded bg-slate-700 text-white `
    + `disabled:bg-slate-300 disabled:cursor-not-allowed">📋 Deep Copy</button>`
    + `<button class="copy-general text-[11px] px-2 py-1 rounded bg-sky-600 text-white `
    + `disabled:bg-slate-300 disabled:cursor-not-allowed">📋 General Copy</button></div>`
    + `<textarea class="manual-input w-full text-sm border border-slate-300 rounded `
    + `px-2 py-1 mb-1" rows="3" placeholder="외부 LLM 의 응답을 여기에 붙여넣으세요"></textarea>`
    + `<button class="manual-submit w-full text-sm py-1 rounded bg-amber-500 `
    + `text-white font-bold">응답 제출</button>`;
  panel.querySelector('.copy-deep').addEventListener('click', (e) => {
    if (panel._deepCopy) copyText(panel._deepCopy, e.currentTarget);
  });
  panel.querySelector('.copy-general').addEventListener('click', (e) => {
    if (panel._generalCopy) copyText(panel._generalCopy, e.currentTarget);
  });
  panel.querySelector('.manual-submit')
       .addEventListener('click', () => submitManual(agentId, phase, panel));
  return panel;
}

// 복사 페이로드를 패널에 저장/갱신한다. 아직 페이로드가 없으면 복사 버튼만
// 비활성화하고 붙여넣기·제출은 항상 열어 둔다 — 세션 고착(deadlock)을 즉시 해소.
function applyManualPayloads(panel, deepCopy, generalCopy) {
  if (deepCopy) panel._deepCopy = deepCopy;
  if (generalCopy) panel._generalCopy = generalCopy;
  panel.querySelector('.copy-deep').disabled = !panel._deepCopy;
  panel.querySelector('.copy-general').disabled = !panel._generalCopy;
}

// 타임라인 재구성 직전 — 작성 중이던 텍스트(수동 응답 초안 + 개입 코멘트)를
// 메모리로 대피시킨다. innerHTML 초기화로 textarea DOM 이 파괴돼도 글자를 잃지 않게.
function captureDrafts() {
  const drafts = { manual: {}, intervention: '', review: '' };
  document.querySelectorAll('.manual-panel').forEach((panel) => {
    const ta = panel.querySelector('.manual-input');
    if (ta && ta.value) {
      const key = (panel.dataset.agentId || '') + '||' + (panel.dataset.phase || '');
      drafts.manual[key] = ta.value;
    }
  });
  const iv = $('interventionInput');
  if (iv && iv.value) drafts.intervention = iv.value;
  const rq = document.querySelector('.review-question');
  if (rq && rq.value) drafts.review = rq.value;
  return drafts;
}

// 스냅샷 렌더 + restoreManualPanels 로 새 textarea 가 배치된 직후 — 대피해 둔
// 텍스트를 되돌린다. 새 칸이 이미 비어 있지 않으면(서버 값 등) 덮어쓰지 않는다.
function restoreDrafts(drafts) {
  if (!drafts) return;
  document.querySelectorAll('.manual-panel').forEach((panel) => {
    const key = (panel.dataset.agentId || '') + '||' + (panel.dataset.phase || '');
    const saved = drafts.manual[key];
    const ta = panel.querySelector('.manual-input');
    if (saved && ta && !ta.value) ta.value = saved;
  });
  const iv = $('interventionInput');
  if (drafts.intervention && iv && !iv.value) iv.value = drafts.intervention;
  const rq = document.querySelector('.review-question');
  if (drafts.review && rq && !rq.value) rq.value = drafts.review;
}

// ---- 선택적 가로채기 검토 게이트 -------------------------------------------
// 검토 대상으로 체크된 에이전트 ID 목록 (collectAgents 와 동일하게 번호 매김).
function currentIntercepts() {
  const ids = [];
  let n = 0;
  document.querySelectorAll('.agent-slot').forEach((slot) => {
    const name = slot.querySelector('.a-name').value.trim();
    const persona = slot.querySelector('.a-persona').value.trim();
    if (!name || !persona) return;
    n += 1;
    if (slot.querySelector('.a-intercept').checked) ids.push('a' + n);
  });
  return ids;
}

// 검토 체크박스 토글 — 토론 진행 중이면 즉시 백엔드에 반영한다.
async function onInterceptToggle() {
  if (!discussionId) return;   // 시작 전엔 startDiscussion 이 일괄 전송한다
  try {
    await fetch(`/discussions/${discussionId}/intercept`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_ids: currentIntercepts() }),
    });
  } catch (e) { /* 가로채기 설정 실패 — 무시 */ }
}

// 가로채기된 에이전트의 초안·사고흐름 검토 패널을 생성/갱신한다.
function onReviewRequired(review) {
  if (!review) return;
  const b = ensureBubble(review.phase, review.agent_id);
  const name = (agentsById[review.agent_id] || {}).name || review.agent_id;
  setStatus('🔍 검토 대기 — ' + name, 'waiting');
  if (!b.body.textContent.trim()) b.body.textContent = '(검토 대기 중…)';
  let panel = b.wrap.querySelector('.review-panel');
  if (!panel) {
    panel = buildReviewPanel();
    b.wrap.appendChild(panel);
  }
  panel.querySelector('.review-reasoning').textContent =
    review.reasoning || '(사고흐름 없음)';
  panel.querySelector('.review-draft').textContent = review.draft || '';
  const qaEl = panel.querySelector('.review-qa');
  qaEl.innerHTML = '';
  (review.qa || []).forEach((x) => appendReviewQA(qaEl, x));
  scrollTimeline();
}

// 검토 패널 DOM (사고흐름·초안·문답·질문창·승인 버튼).
function buildReviewPanel() {
  const panel = document.createElement('div');
  panel.className =
    'review-panel mt-2 pt-2 border-t border-dashed border-violet-400';
  panel.innerHTML =
    `<div class="text-[11px] font-bold text-violet-700 mb-1">`
    + `🔍 포스팅 전 검토 — 초안·사고흐름</div>`
    + `<div class="text-[11px] text-slate-500">사고흐름</div>`
    + `<div class="review-reasoning text-xs text-slate-600 bg-slate-50 rounded `
    + `px-2 py-1 mb-1 whitespace-pre-wrap"></div>`
    + `<div class="text-[11px] text-slate-500">발언 초안</div>`
    + `<div class="review-draft text-sm text-slate-800 bg-violet-50 rounded `
    + `px-2 py-1 mb-1 whitespace-pre-wrap"></div>`
    + `<div class="review-qa space-y-1 mb-1"></div>`
    + `<textarea class="review-question w-full text-sm border border-slate-300 `
    + `rounded px-2 py-1 mb-1" rows="2" `
    + `placeholder="이 초안에 대해 질문하세요 (선택)"></textarea>`
    + `<div class="flex gap-1">`
    + `<button class="review-ask flex-1 text-xs py-1 rounded bg-slate-700 `
    + `text-white disabled:bg-slate-300">질문</button>`
    + `<button class="review-approve flex-1 text-xs py-1 rounded bg-violet-600 `
    + `text-white font-bold">승인 · 포스팅</button></div>`;
  panel.querySelector('.review-ask')
       .addEventListener('click', () => askReview(panel));
  panel.querySelector('.review-approve')
       .addEventListener('click', () => approveReview(panel));
  return panel;
}

// 문답 1쌍을 검토 패널에 추가한다.
function appendReviewQA(qaEl, exchange) {
  const div = document.createElement('div');
  div.className = 'text-xs border-l-2 border-violet-300 pl-2';
  div.innerHTML =
    `<div class="text-violet-700">Q. ${escapeHtml(exchange.question)}</div>`
    + `<div class="text-slate-700">A. ${escapeHtml(exchange.answer)}</div>`;
  qaEl.appendChild(div);
}

// 검토 문답 답변 수신 — 현재 검토 패널에 추가한다.
function onReviewAnswer(exchange) {
  const panel = document.querySelector('.review-panel');
  if (panel && exchange) {
    appendReviewQA(panel.querySelector('.review-qa'), exchange);
    // 답변이 도착했다 — 질문·승인 버튼을 다시 연다.
    panel.querySelector('.review-ask').disabled = false;
    panel.querySelector('.review-approve').disabled = false;
  }
  scrollTimeline();
}

// 검토 중 질문 전송 — 답변은 review_answer WS 메시지로 돌아온다.
async function askReview(panel) {
  const q = panel.querySelector('.review-question').value.trim();
  if (!q) { alert('질문을 입력하세요.'); return; }
  const ask = panel.querySelector('.review-ask');
  const approve = panel.querySelector('.review-approve');
  // 답변 도착 전까지 승인을 막는다 — '질문+승인 동시' 레이스를 차단.
  ask.disabled = true;
  approve.disabled = true;
  try {
    const r = await fetch(`/discussions/${discussionId}/review/question`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    if (!r.ok) throw new Error('질문 전송 실패: ' + r.status);
    panel.querySelector('.review-question').value = '';
    // 성공 시엔 review_answer 수신(onReviewAnswer)이 버튼을 다시 켠다.
  } catch (e) {
    alert(e.message);
    ask.disabled = false;
    approve.disabled = false;
  }
}

// 검토 초안 승인 — 문답을 반영한 최종 발언이 확정된다.
async function approveReview(panel) {
  const btn = panel.querySelector('.review-approve');
  btn.disabled = true;
  try {
    const r = await fetch(`/discussions/${discussionId}/review/approve`,
                          { method: 'POST' });
    if (!r.ok) throw new Error('승인 실패: ' + r.status);
    panel.remove();   // agent_turn 메시지가 말풍선을 확정한다
    setStatus('검토 승인 — 최종 발언 생성 중…', 'run');
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
  }
}

function renderSnapshot(state) {
  // 재연결 시 중복 렌더를 막기 위해 타임라인을 비우고 스냅샷으로 완전 재구성한다.
  // 단, 비우기 전에 작성 중이던 텍스트를 대피시켜 두고(captureDrafts), 재구성이
  // 끝난 직후 복원한다(restoreDrafts) — 일시적 단절에도 입력 글자를 잃지 않도록.
  const drafts = captureDrafts();
  clearTimeline();
  bubbles = {};
  hideInterventionBar();
  agentsById = {};
  (state.agents || []).forEach((a) => { agentsById[a.agent_id] = a; });
  if (state.topic) $('topicInput').value = state.topic;
  setTopicReadOnly(true);            // 스냅샷이 있다 = 진행 중인 토론 — 주제 고정
  autoGrowTopic();
  currentFormatId = state.format_id || 'debate';   // 단계 렌더링의 기준 형식
  hasFacilitator = !!state.facilitator;             // postIntervention 분기

  usageTotal = 0;   // 스냅샷 재구성 — 누적 사용량을 0 부터 다시 합산한다
  // phase_records 는 단계 인스턴스 키(반복 단계는 'probe#1'…)로, 실행 순서대로
  // 들어 있다 — 가변 길이 형식의 라운드를 그대로 재구성한다.
  Object.values(state.phase_records || {}).forEach((turns) => {
    (turns || []).forEach((turn) => finalizeTurn(turn));
  });
  (state.phase_summaries || []).forEach((s) => renderSummary(s.phase, s, null));
  (state.facilitator_notes || []).forEach((n) => renderFacilitatorNote(n));
  (state.user_interventions || []).forEach((iv) => renderIntervention(iv));
  if (state.final_joint_agreement) renderAgreement(state.final_joint_agreement);

  if (state.status === 'waiting_for_user') {
    onAwaitingUser({ completed_phase: state.current_phase });
  } else if (state.status === 'completed') {
    setStatus('✅ 토론 종료', 'done');
  } else if (state.status === 'error') {
    renderError(state.error || '오류 상태');
  } else if (state.status === 'pending_manual_input') {
    setStatus('⏸ 수동 에이전트 응답 대기 중', 'waiting');
    restoreManualPanels(state);   // 새로고침/재연결 시 복붙 터널 패널 복구
  } else if (state.status === 'pending_review') {
    setStatus('🔍 검토 대기 중', 'waiting');
    if (state.review) onReviewRequired(state.review);   // 재연결 시 검토 패널 복구
  } else if (state.status === 'running') {
    setStatus('진행 중…', 'run');
  }
  // 재구성·패널 복구가 모두 끝났다 — 대피시켜 둔 작성 중 텍스트를 복원한다.
  restoreDrafts(drafts);
}

// PENDING_MANUAL_INPUT 스냅샷에서 — 현재 단계에 아직 발언하지 않은 수동 공급자
// 에이전트를 역추적해 복붙 패널을 강제 복구한다. 복사 페이로드는 백엔드의
// manual_input_required 재전송이 채우며, 그 전이라도 붙여넣기·제출은 가능하다.
function restoreManualPanels(state) {
  const phase = state.current_phase;
  const posted = new Set(
    ((state.phase_records || {})[phase] || []).map((t) => t.agent_id));
  (state.agents || []).forEach((a) => {
    if (a.provider === 'manual' && !posted.has(a.agent_id)) {
      onManualInputRequired({ agent_id: a.agent_id, phase: phase,
                              deep_copy: null, general_copy: null });
    }
  });
}

// ---- 동기식 대기 큐 인터페이스 (개입 컴포넌트) ------------------------------
function onAwaitingUser(payload) {
  const completedPhase = payload.completed_phase;
  lastCompletedPhase = completedPhase;
  setStatus('⏸ ' + phaseLabel(completedPhase) + ' 종료 — 유저 개입 대기', 'waiting');
  let label = '⏸ ' + phaseLabel(completedPhase) + ' 종료';
  // 다음에 진행할 단계 인스턴스(가변 길이 형식이면 라운드)를 안내한다.
  if (payload.next_label) {
    label += ` — 다음: ${payload.next_label} (▶ 으로 진행)`;
  } else {
    label += ' — 다음 단계 진입 전 개입할 수 있습니다';
  }
  const facDec = payload.facilitator_decision;
  if (facDec) {
    // 사회자가 진행을 결정했다 — 그 판단을 우선 안내한다 (근접도 권고 대신).
    const decLabel = { continue: '문답을 한 라운드 더 진행',
                       next: '다음 단계로 진행' };
    label += ` · 🎙 사회자 판단: ${decLabel[facDec] || facDec}`;
  } else if (lastConvergence != null) {
    // 합의 근접도로 다음 행동을 권고한다 (사회자 결정이 없을 때만).
    const pct = Math.round(lastConvergence * 100);
    if (lastConvergence >= 0.75) {
      label += ` · 💡 합의 근접도 ${pct}% — 충분히 수렴했습니다, '여기서 종료' 고려`;
    } else if (lastConvergence < 0.4) {
      label += ` · 합의 근접도 ${pct}% — 이견이 큽니다, 계속 진행 권장`;
    } else {
      label += ` · 합의 근접도 ${pct}%`;
    }
  }
  $('interventionLabel').textContent = label;
  showInterventionBar();
}

function showInterventionBar() {
  $('interventionBar').classList.remove('hidden');
  $('postBtn').disabled = false;
  $('skipBtn').disabled = false;
  $('endBtn').disabled = false;
}
function hideInterventionBar() {
  $('interventionBar').classList.add('hidden');
}

// 게이트 구간에서 토론을 조기 종료한다 (남은 단계는 진행하지 않음).
async function endDiscussion() {
  if (!discussionId) return;
  if (!confirm('지금 토론을 종료할까요? 남은 단계는 진행하지 않습니다.')) return;
  $('endBtn').disabled = true;
  try {
    const r = await fetch(`/discussions/${discussionId}/end`, { method: 'POST' });
    if (!r.ok) throw new Error('종료 실패: ' + r.status);
    hideInterventionBar();
  } catch (e) {
    alert(e.message);
    $('endBtn').disabled = false;
  }
}

async function advance() {
  const res = await fetch(`/discussions/${discussionId}/advance`, { method: 'POST' });
  if (!res.ok) throw new Error('다음 단계 진행 실패: ' + res.status + ' ' + (await res.text()));
  hideInterventionBar();
  setStatus('다음 단계 진행 중…', 'run');
}

async function postIntervention() {
  const message = $('interventionInput').value.trim();
  if (!message) { alert('개입 내용을 입력하세요. (그냥 진행하려면 Skip 버튼)'); return; }
  $('postBtn').disabled = true;
  $('skipBtn').disabled = true;
  try {
    // Participant H 명의로 개입 기록
    const r = await fetch(`/discussions/${discussionId}/interventions`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, after_phase: lastCompletedPhase }),
    });
    if (!r.ok) throw new Error('개입 등록 실패: ' + r.status);
    $('interventionInput').value = '';
    // 사회자 + 비반복 단계 게이트 → 자동 진행 대신 사회자가 between 을 다시 쓰는
    // 동안 기다린다. 새 노트가 WS 로 도착하면 기존 카드를 교체한다. 사용자는 그걸
    // 보고 'Skip' 으로 다음 단계 진행을 직접 누른다.
    if (hasFacilitator && !isCurrentPhaseRepeatable()) {
      setStatus('🎙 재조율 중… 사회자가 H 개입을 반영해 중간 조율을 다시 쓰는 중',
                'waiting');
      showInterventionBar();   // 버튼 재활성화 — 추가 개입·진행·종료 모두 가능
    } else {
      // 사회자 미지정·반복 단계 게이트 → 종전 동작 (자동 advance).
      await advance();
    }
  } catch (e) {
    alert(e.message);
    showInterventionBar();
  }
}

async function skipPhase() {
  $('postBtn').disabled = true;
  $('skipBtn').disabled = true;
  try {
    await advance();
  } catch (e) {
    alert(e.message);
    showInterventionBar();
  }
}

function onCompleted(payload) {
  hideInterventionBar();
  setStatus('✅ 토론 종료', 'done');
  if (payload && payload.final_joint_agreement) renderAgreement(payload.final_joint_agreement);
  const div = document.createElement('div');
  div.className = 'text-center text-sm text-slate-500 py-5';
  div.textContent = '— 5단계 토론이 종료되었습니다 —';
  timelineEl.appendChild(div);
  scrollTimeline();
  $('startBtn').disabled = false;
}

// 토론 주제 textarea 를 내용 높이에 맞춰 키운다 (최대 40vh, 초과 시 스크롤).
function autoGrowTopic() {
  const el = $('topicInput');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, window.innerHeight * 0.4) + 'px';
}
// 주제 영역 잠금·해제 — 편집 모드는 textarea, 잠긴 상태는 마크다운 렌더 뷰로
// 토글한다. 마크다운/LaTeX 가 다른 영역과 동일하게 적용된다.
function setTopicReadOnly(readOnly) {
  const ta = $('topicInput');
  const view = $('topicRender');
  ta.readOnly = readOnly;
  if (readOnly) {
    view.innerHTML = renderMarkdown(ta.value || '');
    view.classList.remove('hidden');
    ta.classList.add('hidden');
  } else {
    view.classList.add('hidden');
    view.innerHTML = '';
    ta.classList.remove('hidden');
    autoGrowTopic();
  }
}

// 토론 형식 목록(GET /formats)을 받아 선택 드롭다운을 채운다.
async function loadFormats() {
  try {
    const res = await fetch('/formats');
    if (!res.ok) return;
    const data = await res.json();
    const sel = $('formatSelect');
    sel.innerHTML = '';
    (data.formats || []).forEach((fmt) => {
      formatsById[fmt.id] = fmt;
      const opt = document.createElement('option');
      opt.value = fmt.id;
      opt.textContent = fmt.name;
      sel.appendChild(opt);
    });
    if (!formatsById[currentFormatId] && data.formats && data.formats[0]) {
      currentFormatId = data.formats[0].id;
    }
    sel.value = currentFormatId;
    onFormatChange();
  } catch (e) { /* 형식 로드 실패 — 기본값으로 진행 */ }
}

// 형식 선택이 바뀌면 설명을 갱신하고, 합의 미지원 형식은 FORCE_CONSENSUS 를 끈다.
function onFormatChange() {
  currentFormatId = $('formatSelect').value;
  const fmt = formatsById[currentFormatId];
  $('formatDesc').textContent = fmt ? fmt.description : '';
  const supports = !!(fmt && fmt.supports_consensus);
  $('forceToggle').disabled = !supports;
  if (!supports) $('forceToggle').checked = false;
}

// ---- 초기화 ----------------------------------------------------------------
// 마크다운: 단일 줄바꿈도 <br> 로(LLM 출력 특성), GitHub 표·취소선 등 지원.
if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true });
PRESETS.forEach(addAgentSlot);
buildFacilitatorSlot();
$('addSlotBtn').addEventListener('click', () => addAgentSlot());
$('facToggle').addEventListener('change', () => {
  $('facilitatorSlot').classList.toggle('hidden', !$('facToggle').checked);
});
$('startBtn').addEventListener('click', startDiscussion);
$('resetBtn').addEventListener('click', resetDiscussion);
$('postBtn').addEventListener('click', postIntervention);
$('skipBtn').addEventListener('click', skipPhase);
$('endBtn').addEventListener('click', endDiscussion);
$('exportBtn').addEventListener('click', exportDiscussion);
$('loadBtn').addEventListener('click', openLoadFile);
$('loadFileInput').addEventListener('change', onLoadFileChange);
$('topicInput').addEventListener('input', autoGrowTopic);
$('formatSelect').addEventListener('change', onFormatChange);
autoGrowTopic();   // 기본 주제 텍스트에 맞춰 초기 높이 조정
loadFormats();     // 형식 목록 로드 + 드롭다운 채우기
</script>
